<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario de Contacto Accesible</title>
</head>
<body>
  <main class="container mt-5">
    <h1>Contacto</h1>
    <form id="contact-form" novalidate>
    <div>
        <label for="name">Nombre</label>
        <input
            type="text"
            id="name"
            name="name"
            aria-required="true"
            aria-label="Nombre"
        >/
    </div>
    <div>
        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            aria-required="true"
            aria-label="Email"
        >/
    </div>
    <div>
        <label for="asunto">Asunto</label>
        <input
            type="text"
            id="asunto"
            name="asunto"
            aria-required="true"
            aria-label="Asunto"
        >/
    </div>
    <div>
        <label for="mensaje">Mensaje</label>
        <textarea
            id="mensaje"
            name="mensaje"
            aria-required="true"
            aria-label="Mensaje"
        >/
    </div>
    <div>
      <button type="submit">Enviar</button>
    </div>     
    </form>
  </main>
</body>
</html>
