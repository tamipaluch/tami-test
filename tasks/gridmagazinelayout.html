<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magazine Layout con Grid</title>

<style>
.container {
  display: grid;
  grid-template-columns: 1fr 3fr 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header header"
    "nav main sidebar"
    "footer footer footer";
  gap: 10px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 10px;
}

.header { grid-area: header; background: #f8f9fa; padding: 20px; }

.nav { grid-area: nav; background: #e9ecef; padding: 15px; }

.main-article { grid-area: main; background: #fff; padding: 20px; }

.sidebar { grid-area: sidebar; background: #f1f3f5; padding: 15px; }

.footer { grid-area: footer; background: #dee2e6; padding: 10px; text-align: center; }

.secondary-articles {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.secondary-articles article {
  flex: 1;
  background: #fff;
  padding: 10px;
  border: 1px solid #ced4da;
}

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    grid-template-areas:
      "header"
      "nav"
      "main"
      "sidebar"
      "footer";
  }
  .secondary-articles {
    flex-direction: column;
  }
}
</style>

</head>
<body>
  <div class="container">
    <header class="header">Magazine Header</header>
    <nav class="nav">Menú de navegación</nav>
    <main class="main-article">
      <h2>Artículo Principal</h2>
      <img src="images/main.webp" alt="Imagen principal" srcset="images/main.webp 1x, images/main@2x.webp 2x" type="image/webp" />
      <p>Contenido del artículo principal...</p>
    </main>
    <section class="secondary-articles">
      <article>
        <h3>Artículo Secundario 1</h3>
        <img src="images/sec1.svg" alt="Icono artículo 1" type="image/svg+xml" />
        <p>Contenido del artículo secundario 1...</p>
      </article>
      <article>
        <h3>Artículo Secundario 2</h3>
        <img src="images/sec2.svg" alt="Icono artículo 2" type="image/svg+xml" />
        <p>Contenido del artículo secundario 2...</p>
      </article>
    </section>
    <aside class="sidebar">Contenido lateral</aside>
    <footer class="footer">Pie de página</footer>
  </div>
</body>
</html>
